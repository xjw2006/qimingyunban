{% extends 'base.html' %}
{% block content %}
<section class="card panel auth-wide">
  <div class="eyebrow">注册与验证</div>
  <h2>邮箱 + 中国大陆手机号双验证注册</h2>
  <p class="muted">本页会同时校验邮箱格式与中国大陆 11 位手机号格式。注册成功后，邮箱与手机号都会被标记为已验证。</p>
  <form method="post" action="/register" class="form-grid two-col-form">
    <label>姓名 / 团队联系人
      <input type="text" name="full_name" placeholder="例如：张三 / 校园轻食团队" required>
    </label>
    <label>登录密码
      <input type="password" name="password" placeholder="至少 8 位，含字母和数字" required>
    </label>
    <label>邮箱地址
      <div class="inline-field">
        <input type="email" name="email" id="registerEmail" placeholder="请输入真实邮箱" required>
        <button class="btn btn-secondary" type="button" id="sendRegisterEmailBtn">发送邮箱验证码</button>
      </div>
    </label>
    <label>确认密码
      <input type="password" name="password_confirm" placeholder="再次输入密码" required>
    </label>
    <label>中国大陆手机号
      <div class="inline-field">
        <input type="text" name="phone" id="registerPhone" placeholder="请输入 11 位手机号" required>
        <button class="btn btn-secondary" type="button" id="sendRegisterPhoneBtn">发送短信验证码</button>
      </div>
    </label>
    <label>邮箱验证码
      <input type="text" name="email_code" placeholder="请输入邮箱验证码" required>
    </label>
    <label>手机验证码
      <input type="text" name="phone_code" placeholder="请输入短信验证码" required>
    </label>
    <div class="result-stack">
      <div id="registerEmailResult" class="inline-result"></div>
      <div id="registerPhoneResult" class="inline-result"></div>
    </div>
    <div class="full-row action-row">
      <button class="btn btn-primary" type="submit">完成注册并登录</button>
      <a class="btn btn-ghost" href="/login">已有账号，去登录</a>
    </div>
  </form>
</section>
{% endblock %}
{% block scripts %}
<script>
setupCodeSender({
  buttonId: 'sendRegisterEmailBtn',
  resultId: 'registerEmailResult',
  buildFormData: () => {
    const fd = new FormData();
    fd.append('purpose', 'register');
    fd.append('email', document.getElementById('registerEmail').value.trim());
    return { url: '/api/auth/send-email-code', formData: fd };
  }
});
setupCodeSender({
  buttonId: 'sendRegisterPhoneBtn',
  resultId: 'registerPhoneResult',
  buildFormData: () => {
    const fd = new FormData();
    fd.append('purpose', 'register');
    fd.append('phone', document.getElementById('registerPhone').value.trim());
    return { url: '/api/auth/send-phone-code', formData: fd };
  }
});
</script>
{% endblock %}
